<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Безопасная передача</title>
    <style>
        /* Стили такие же, как на твоем основном сайте для консистентности */
        body { background: #e4e7eb; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        textarea { width: 100%; height: 100px; margin: 20px 0; padding: 15px; border: 1px solid #cbd5e1; border-radius: 12px; resize: none; }
        button { background: #1e293b; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 700; }
        button:hover { background: #0f172a; }
        #result { margin-top: 20px; word-break: break-all; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>Безопасная передача</h3>
    <p style="font-size: 0.8rem; color: #475569;">Данные исчезнут после первого открытия.</p>
    <textarea id="secretInput" placeholder="Вставь пароль или код сюда..."></textarea>
    <button onclick="createSecret()">ОТПРАВИТЬ БЕЗОПАСНО</button>
    <div id="result"></div>
</div>

<script>
async function createSecret() {
    const input = document.getElementById('secretInput');
    const resultDiv = document.getElementById('result');
    if (!input.value) return alert('Введите данные!');

    resultDiv.innerText = 'Создаю ссылку...';

    try {
        // Мы используем API One-Time Secret
        const response = await fetch('https://onetimesecret.com/api/v1/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `secret=${encodeURIComponent(input.value)}&passphrase=&ttl=3600`
        });

        const data = await response.json();
        if (data.secret_link) {
            resultDiv.innerHTML = `Готово! Скопируй ссылку и пришли мне:<br><br><input type="text" value="${data.secret_link}" style="width:100%; padding:8px;" readonly>`;
        }
    } catch (e) {
        resultDiv.innerText = 'Ошибка соединения. Попробуйте еще раз.';
    }
}
</script>

</body>
</html>
